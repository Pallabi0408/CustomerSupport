{% extends "base.html" %}

{% block title %}Settings{% endblock %}
{% block header %}Account Settings{% endblock %}

{% block content %}
<div class="content-row">
    <div class="card">
        <h3>Profile Information</h3>
        <form style="margin-top: 1.5rem;" onsubmit="event.preventDefault(); alert('Settings saved!');">
            <div class="form-group">
                <label>Username</label>
                <input type="text" value="{{ session.get('username') }}" disabled style="background-color: var(--secondary-bg); opacity: 0.7;">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Add an email address...">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
    
    <div class="card">
        <h3>Preferences</h3>
        <div style="margin-top: 1.5rem;">
            <div class="form-group">
                <label>Notifications</label>
                <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;">
                    <input type="checkbox" id="email-notif" checked>
                    <label for="email-notif" style="margin: 0; display: inline;">Email me when a ticket is resolved</label>
                </div>
            </div>
            <div class="form-group" style="margin-top: 1.5rem;">
                <label>Theme</label>
                <p style="font-size: 0.875rem; color: var(--text-secondary);">Use the "Toggle Theme" button in the sidebar to switch between light and dark mode.</p>
            </div>
            <hr style="border: none; border-top: 1px solid var(--border-color); margin: 1.5rem 0;">
            <button class="btn btn-secondary text-danger" style="border-color: var(--danger-color);" onclick="alert('Action disabled in demo.')">Delete Account</button>
        </div>
    </div>
</div>
{% endblock %}
