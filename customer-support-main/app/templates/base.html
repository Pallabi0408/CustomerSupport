<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} - AI Support Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Support AI</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('dashboard.index') }}" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
                <a href="{{ url_for('dashboard.tickets') }}" class="nav-item {% if active_page == 'tickets' %}active{% endif %}">Tickets</a>
                <a href="{{ url_for('dashboard.analytics') }}" class="nav-item {% if active_page == 'analytics' %}active{% endif %}">Analytics</a>
                <a href="{{ url_for('dashboard.settings') }}" class="nav-item {% if active_page == 'settings' %}active{% endif %}">Settings</a>
            </nav>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="btn btn-secondary">Toggle Theme</button>
                <a href="{{ url_for('auth.logout') }}" class="nav-item text-danger" style="margin-top: 1rem; padding:0;">Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h2>{% block header %}Welcome back, {{ session.get('username') }}{% endblock %}</h2>
            </header>

            <div class="dashboard-grid">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
